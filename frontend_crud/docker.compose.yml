version: "3.7"

services:
  mediacrud-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: research-ui
    restart: always
    ports:
      - "8086:3000"
    env_file:
      - .env
    environment:
      PORT: "3000"
      NODE_ENV: production
    networks:
      - alnetwork
    labels:
      - traefik.enable=true
      - traefik.docker.network=alnetwork
      - traefik.http.routers.research-ui.rule=Host(`mediacrud.winespirit.ch`) || Host(`www.research.wineagent.ch`)
      - traefik.http.routers.research-ui.entrypoints=websecure
      - traefik.http.routers.research-ui.tls=true
      - traefik.http.routers.research-ui.tls.certresolver=lets-encrypt
      - traefik.http.services.research-ui.loadbalancer.server.port=3000

networks:
  alnetwork:
    external: true