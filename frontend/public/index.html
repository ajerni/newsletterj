<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schulmonitor ZH — Medienspiegel</title>
    <script>
        (function () {
            const gespeichert = localStorage.getItem("theme");
            const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
            const theme = gespeichert === "dark" || gespeichert === "light"
                ? gespeichert
                : (prefersDark ? "dark" : "light");
            document.documentElement.setAttribute("data-theme", theme);
        })();
    </script>
    <link rel="stylesheet" href="/styles.css">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body>
    <header>
        <div class="container header-inner">
            <div class="header-top">
                <h1>
                    <button type="button" class="site-home"
                        hx-get="/api/dashboard" hx-target="#content"
                        onclick="setActive(document.getElementById('nav-uebersicht'))">
                        Schulmonitor ZH
                    </button>
                </h1>
                <div class="header-utilities">
                    <form method="post" action="/logout" class="logout-form">
                        <button type="submit" class="nav-btn logout-btn">Logout</button>
                    </form>
                    <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Darstellung wechseln" title="Hell / Dunkel">☀</button>
                </div>
            </div>
            <nav class="header-nav" aria-label="Hauptnavigation">
                <button id="nav-uebersicht" class="nav-btn active" hx-get="/api/dashboard" hx-target="#content" onclick="setActive(this)">Übersicht</button>
                <button class="nav-btn" hx-get="/api/artikel" hx-target="#content" onclick="setActive(this)">Artikel</button>
                <button class="nav-btn" hx-get="/api/personen" hx-target="#content" onclick="setActive(this)">Personen</button>
                <button class="nav-btn" hx-get="/api/gemeinden" hx-target="#content" onclick="setActive(this)">Gemeinden</button>
                <button class="nav-btn" hx-get="/api/faelle" hx-target="#content" onclick="setActive(this)">Fälle</button>
                <button class="nav-btn" hx-get="/api/suche" hx-target="#content" onclick="setActive(this)">Suche</button>
                <button class="nav-btn" hx-get="/api/chat" hx-target="#content" onclick="setActive(this)">Chat</button>
                <button class="nav-btn" hx-get="/api/dossier" hx-target="#content" onclick="setActive(this)">Dossier</button>
                <button class="nav-btn" hx-get="/api/netzwerk" hx-target="#content" onclick="setActive(this)">Netzwerk</button>
                <button class="nav-btn" hx-get="/api/laeufe" hx-target="#content" onclick="setActive(this)">Läufe</button>
            </nav>
        </div>
    </header>
    <main class="container">
        <div id="content" hx-get="/api/dashboard" hx-trigger="load" hx-target="this">
            <p class="muted">Laden...</p>
        </div>
    </main>

    <div id="global-loading" class="htmx-indicator global-loading" role="status" aria-live="polite" aria-busy="true">
        <div class="global-loading-backdrop"></div>
        <div class="global-loading-card">
            <div class="spinner" aria-hidden="true"></div>
            <p id="global-loading-text" class="global-loading-text">Wird geladen…</p>
        </div>
    </div>

    <!-- Confirmation dialog (replaces native confirm() for hx-confirm) -->
    <div id="confirm-overlay" class="modal-overlay" hidden>
        <div class="modal" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
            <h3 id="confirm-title">Bestätigen</h3>
            <p id="confirm-message"></p>
            <div class="modal-actions">
                <button type="button" class="btn" id="confirm-cancel">Abbrechen</button>
                <button type="button" class="btn btn-danger" id="confirm-ok">Löschen</button>
            </div>
        </div>
    </div>

    <script>
        function setActive(el) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }

        (function () {
            const toggle = document.getElementById("theme-toggle");
            const labels = { light: "☀", dark: "☾" };

            function aktuellesTheme() {
                return document.documentElement.getAttribute("data-theme") === "dark" ? "dark" : "light";
            }

            function themeAnwenden(theme) {
                document.documentElement.setAttribute("data-theme", theme);
                localStorage.setItem("theme", theme);
                toggle.textContent = labels[theme];
                toggle.title = theme === "dark" ? "Helles Design" : "Dunkles Design";
            }

            themeAnwenden(aktuellesTheme());

            toggle.addEventListener("click", () => {
                themeAnwenden(aktuellesTheme() === "dark" ? "light" : "dark");
            });
        })();

        // Keep nav highlighting in sync when navigating via links inside the content
        document.body.addEventListener('htmx:afterSwap', (e) => {
            const pfad = e.detail?.pathInfo?.requestPath || '';
            const sektion = pfad.split('?')[0].split('/')[2];
            if (!sektion) return;
            const btn = [...document.querySelectorAll('.nav-btn')].find((b) =>
                (b.getAttribute('hx-get') || '').startsWith('/api/' + sektion)
            );
            if (btn) setActive(btn);
        });

        // Styled confirmation dialog for all hx-confirm buttons
        (function () {
            const overlay = document.getElementById('confirm-overlay');
            const message = document.getElementById('confirm-message');
            const okBtn = document.getElementById('confirm-ok');
            const cancelBtn = document.getElementById('confirm-cancel');
            let issueRequest = null;

            function schliessen() {
                overlay.hidden = true;
                issueRequest = null;
            }

            document.body.addEventListener('htmx:confirm', (e) => {
                if (!e.detail.question) return;
                e.preventDefault();
                message.textContent = e.detail.question;
                issueRequest = () => e.detail.issueRequest(true);
                overlay.hidden = false;
                okBtn.focus();
            });

            okBtn.addEventListener('click', () => {
                const anfrage = issueRequest;
                schliessen();
                if (anfrage) anfrage();
            });
            cancelBtn.addEventListener('click', schliessen);
            overlay.addEventListener('click', (e) => {
                if (e.target === overlay) schliessen();
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && !overlay.hidden) schliessen();
            });
        })();
    </script>
</body>
</html>
